{% load static i18n %}
<article class="activity-card card h-100 border-0 rounded-4 overflow-hidden">
  <div class="activity-card__media overflow-hidden{% if media_tone %} activity-card__media--{{ media_tone }}{% endif %}">
    {% if image %}
    <img
      src="{% static image %}"
      class="activity-card__img w-100"
      alt="{{ image_alt }}"
      width="400"
      height="240"
      loading="lazy"
    />
    {% elif media_tone %}
    <span class="activity-card__media-icon" aria-hidden="true">
      <i class="bi {{ media_icon }}"></i>
    </span>
    <span class="visually-hidden">{{ title }}</span>
    {% endif %}
  </div>
  <div class="card-body d-flex flex-column p-3 pt-2">
    <h3 class="activity-card__title h5 text-color mb-2">{{ title }}</h3>
    <p class="activity-card__text text-muted mb-3 flex-grow-1">{{ description }}</p>
    <a
      href="{% if link_url %}{{ link_url }}{% else %}{% url 'champ_activité' %}#{{ anchor }}{% endif %}"
      class="btn btn-sm activity-card__btn align-self-start{% if hide_button_icon %} activity-card__btn--no-icon{% endif %}"
    >
      {% if button_label %}{{ button_label }}{% else %}{% trans "En savoir plus" %}{% endif %}
      {% if not hide_button_icon %}<i class="bi bi-arrow-right-short" aria-hidden="true"></i>{% endif %}
    </a>
  </div>
</article>

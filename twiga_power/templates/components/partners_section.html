{% load i18n %}

<section id="partners" class="partners-section pt-4 pt-lg-5 pb-5 mb-5" aria-labelledby="partners-heading">
  <div class="container px-4">
    <div class="row justify-content-center">
      <div class="col-xl-10">
        <header
          class="partners-section__header text-center mb-4 mb-lg-5"
          data-sal="fade"
          data-sal-duration="800"
        >
          <p class="partners-section__eyebrow text-uppercase small fw-semibold mb-2">{% trans "Nos partenaires" %}</p>
          <h2 id="partners-heading" class="partners-section__title h2 mb-3">
            {% trans "Nous travaillons avec les meilleurs partenaires" %}
          </h2>
          <div class="project-detail__title-accent mx-auto mb-3" aria-hidden="true"></div>
          <p class="partners-section__lead mb-0 mx-auto">
            {% trans "Ensemble pour une énergie fiable et durable." %}
          </p>
        </header>

        <div
          class="partners-section__logos-wrap"
          data-sal="fade"
          data-sal-duration="700"
          data-sal-delay="120"
        >
          {% include "components/partners_logos_grid.html" %}
        </div>
      </div>
    </div>
  </div>
</section>

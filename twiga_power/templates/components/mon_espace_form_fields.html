{% load i18n %}
<div class="contact-page__field mb-0">
  <label class="contact-page__field-label" for="{{ field_prefix }}message">
    {% if message_label %}{{ message_label }}{% else %}{% trans "Message" %}{% endif %}
  </label>
  <textarea
    name="message"
    id="{{ field_prefix }}message"
    class="contact-page__input contact-page__input--textarea form-control{% if errors.message %} is-invalid{% endif %}"
    rows="5"
    placeholder="{% if message_placeholder %}{{ message_placeholder }}{% else %}{% trans 'Écrivez votre message…' %}{% endif %}"
    required
    minlength="10"
    data-msg-required="{% trans 'Veuillez saisir votre message.' %}"
    data-msg-minlength="{% trans 'Votre message doit contenir au moins 10 caractères.' %}"
  >{{ post_data.message|default:'' }}</textarea>
  <div class="invalid-feedback">
    {% if errors.message %}{{ errors.message }}{% else %}{% trans "Votre message doit contenir au moins 10 caractères." %}{% endif %}
  </div>
</div>

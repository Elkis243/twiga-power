{% load static i18n %}
<!DOCTYPE html>
<html lang="fr">
  <head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-22BC9E8S49"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-22BC9E8S49");
    </script>

    <!-- Encodage & responsive -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />

    <!-- Titre de la page -->
    <title>{% block title %}{{ page|default:'Twiga Power' }} - Électricité fiable et durable en RDC{% endblock title %}</title>

    <!-- SEO : Meta Description & Keywords -->
    <meta
      name="description"
      content="{% block meta_description %}Twiga Power, entreprise congolaise, fournit une électricité fiable et durable en RDC, couvrant la production, le transport et la distribution d'énergie.{% endblock meta_description %}"
    />
    <meta
      name="keywords"
      content="Twiga Power, électricité, énergie, infrastructures électriques, Afrique, énergie renouvelable, distribution, production, maintenance, RDC, République Démocratique du Congo, hydroélectrique, énergie durable"
    />
    <meta name="author" content="Twiga Power SARL" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />
    <meta name="google-site-verification" content="" />
    <link rel="canonical" href="https://{{ request.get_host }}{{ request.path }}" />

    <!-- Open Graph pour les réseaux sociaux -->
    <meta property="og:title" content="{{ page|default:'Twiga Power' }} - Électricité fiable et durable en RDC" />
    <meta
      property="og:description"
      content="Twiga Power, entreprise congolaise, fournit des solutions électriques fiables et durables, couvrant la production, le transport, la transformation, la distribution et la commercialisation d'énergie en République Démocratique du Congo."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://{{ request.get_host }}{{ request.path }}" />
    <meta property="og:image" content="https://{{ request.get_host }}{% static 'images/logo.png' %}" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Site officiel de Twiga Power SARL - Électricité fiable et durable en RDC" />
    <meta property="og:site_name" content="Twiga Power" />
    <meta property="og:locale" content="fr_FR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{ page|default:'Twiga Power' }} - Électricité fiable et durable en RDC" />
    <meta name="twitter:description" content="Twiga Power, entreprise congolaise, fournit des solutions électriques fiables et durables." />
    <meta name="twitter:image" content="https://{{ request.get_host }}{% static 'images/logo.png' %}" />
    <meta name="twitter:image:alt" content="Site officiel de Twiga Power SARL" />

      <!-- Favicon - Configuration complète -->
    <!-- Favicon standard -->
    <link rel="icon" type="image/x-icon" href="{% static 'images/favicon/favicon.ico' %}" />
    <link rel="shortcut icon" type="image/x-icon" href="{% static 'images/favicon/favicon.ico' %}" />

    <!-- Favicons PNG pour différents navigateurs -->
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'images/favicon/favicon-16x16.png' %}" />
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'images/favicon/favicon-32x32.png' %}" />
    <link rel="icon" type="image/png" sizes="192x192" href="{% static 'images/favicon/android-chrome-192x192.png' %}" />
    <link rel="icon" type="image/png" sizes="512x512" href="{% static 'images/favicon/android-chrome-512x512.png' %}" />

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'images/favicon/apple-touch-icon.png' %}" />

    <!-- Web App Manifest -->
    <link rel="manifest" href="{% static 'images/favicon/site.webmanifest' %}" />


    <!-- Theme Colors -->
    <meta name="theme-color" content="#022f54" />
    <meta name="msapplication-TileColor" content="#022f54" />
    <meta name="msapplication-TileImage" content="https://{{ request.get_host }}{% static 'images/logo.png' %}?v=2" />
    <meta name="msapplication-config" content="{% url 'browserconfig_xml' %}?v=2" />

    <!-- Additional SEO -->
    <meta name="application-name" content="Twiga Power" />
    <meta name="apple-mobile-web-app-title" content="Twiga Power" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Bootstrap & Icônes -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

    <!-- Fonts Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet" />

    <!-- Sal.js (Scroll Animation Library) -->
    <link rel="stylesheet" href="https://unpkg.com/sal.js/dist/sal.css" />

    <!-- Base CSS -->
    <link href="{% static 'style/index.css' %}" rel="stylesheet" />

    <!-- Extra CSS Block -->
    {% block extra_css %}{% endblock extra_css %}
  </head>

  <body>
    <div id="loading" class="loading-overlay">
      <img src="{% static 'images/animate.gif' %}" alt="{% trans 'Chargement...' %}" class="loading-image" width="150" />
    </div>

    {% block base %} {% endblock base %}

    <!-- Bootstrap JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-k6d4wzSIapyDyv1kpU366/PK5hCdSbCRGRCMv+eplOQJWyd1fbcAu9OCUj5zNLiq"
      crossorigin="anonymous"
    ></script>
    <script src="https://unpkg.com/sal.js/dist/sal.js"></script>
    <script src="{% static 'js/loader.js' %}"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        // Récupérer l'élément Offcanvas Bootstrap
        const offcanvasElement = document.getElementById("offcanvasNavbar");

        if (offcanvasElement) {
          // Récupérer ou créer l'instance Bootstrap
          const bsOffcanvas = bootstrap.Offcanvas.getOrCreateInstance(offcanvasElement);

          // Récupérer le lien Services
          const servicesLink = document.getElementById("services-link");

          if (servicesLink) {
            servicesLink.addEventListener("click", function () {
              bsOffcanvas.hide();
            });
          }
        }
      });
      sal({
        threshold: 0.1,
        once: false,
        easing: "ease-in-out",
      });
    </script>
  </body>
</html>
